plugins {
	id "java-library"
	id "maven-publish"
    id 'shared-common'
    id "com.vanniktech.maven.publish" version "0.36.0"
}

group='io.github.cancech'

java {    
    withJavadocJar()
    withSourcesJar()
}

publishing {
    publications {
        mavenJava(MavenPublication) {
            from components.java
        }
    }
}
